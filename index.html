<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    
    <title> Mini Dulzuras | Pastelería Artesanal</title>

    <meta name="description" content="Las mejores donas artesanales de la ciudad.">
    <meta name="keywords" content="donas, donuts, pastelería, postres">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

   

    <nav class="navbar navbar-expand-lg navbar-dark morado">
        <div class="container">

            <a class="navbar-brand fw-bold" href="#">
                 Mini Dulzuras
            </a>

            <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Inicio</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="usuarios.html"> Registro </a>
                    </li>

                </ul>

            </div>

        </div>
    </nav>

 

    <section class="container text-center mt-5">

        <h1 class="titulo">
            Bienvenido a Mini Dulzuras
        </h1>

        <p class="lead">
            Disfruta nuestras deliciosas donas artesanales
            preparadas con ingredientes frescos y de calidad.
        </p>

        <img
            src="img/Mini_Donas.jfif"
            class="img-fluid rounded shadow banner"
            alt="Donas">

    </section>

    

    <div class="text-center my-5">

        <button
            class="btn btn-morado btn-lg"
            data-bs-toggle="modal"
            data-bs-target="#registroModal">

            Registrarse

        </button>

    </div>

    

    <div class="modal fade" id="registroModal">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">
                        Registro de Cliente
                    </h5>

                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    <form id="formulario">

                        <div class="mb-3">
                            <label>Nombre Completo</label>
                            <input type="text"
                                id="nombre"
                                class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Correo Electrónico</label>
                            <input type="email"
                                id="correo"
                                class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Edad</label>
                            <input
                                type="text"
                                id="edad"
                                class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Teléfono</label>
                            <input type="text"
                                id="telefono"
                                class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Sabor Favorito</label>

                            <select
                                id="sabor"
                                class="form-control">

                                <option value="">
                                    Seleccione
                                </option>

                                <option>Chocolate</option>
                                <option>Mora</option>
                                <option>Vainilla</option>
                                <option>Oreo</option>

                            </select>
                        </div>

                        <button
                            type="submit"
                            class="btn btn-morado w-100">

                            Guardar Registro

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    
    <script src="js/script.js"></script>

</body>

</html>
